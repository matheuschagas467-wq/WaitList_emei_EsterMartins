<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acesso Institucional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      font-size: 13px;
      font-weight: 600;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 14px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1351b4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .erro {
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Acesso Institucional</h2>

    <div class="erro" id="erro-login"></div>

    <label>Instituição</label>
    <select id="instituicao">
      <option value="">Selecione</option>
      <option value="jorge_prado">Creche Municipal Jorge Prado de Oliveira</option>
      <option value="ana_anjos">Creche Municipal Ana dos Anjos Santos</option>
      <option value="ester_martins">Creche Municipal Ester Martins</option>
    </select>

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite a senha">

    <button onclick="login()">Entrar</button>
  </div>

  <script src="login.js"></script>
</body>
</html>
