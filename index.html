<!DOCTYPE html>
<html>
<head>

<body>

<script>
if(!localStorage.getItem("instituicaoLogada")){
window.location.href="login.html";
}
</script>

<button onclick="gerarPDF()">PDF</button>

<table>

<tr>
<th>#</th>
<th>Criança</th>

<th>Inscrição</th>
<th>Resp.</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
