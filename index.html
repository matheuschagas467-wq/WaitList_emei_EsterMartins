<section class="form-container">

  <h2>📋 Cadastro na Lista de Espera</h2>

  <div class="input-group">
    <label>👶 Nome da Criança</label>
    <input type="text" id="nome" placeholder="Ex: João da Silva">
  </div>

  <div class="input-group">
    <label>🎂 Data de Nascimento</label>
    <input type="date" id="nascimento">
  </div>

  <div class="input-group">
    <label>📅 Data de Inscrição</label>
    <input type="date" id="inscricao">
  </div>

  <div class="input-group">
    <label>👨‍👩‍👧 Nome do Responsável</label>
    <input type="text" id="responsavel" placeholder="Ex: Maria Souza">
  </div>

  <div class="input-group">
    <label>📞 Telefone</label>
    <input type="text" id="telefone" placeholder="(00) 00000-0000">
  </div>

  <div class="input-group">
    <label>🏠 Endereço</label>
    <input type="text" id="endereco" placeholder="Rua, número, bairro">
  </div>

  <div class="input-group">
    <label>📝 Observações</label>
    <textarea id="obs" placeholder="Informações adicionais"></textarea>
  </div>

  <div class="input-group">
    <label>📌 Status</label>
    <select id="status">
      <option>Aguardando</option>
      <option>Chamado</option>
      <option>Matriculado</option>
      <option>Desistiu</option>
    </select>
  </div>

  <button class="btn-add" onclick="addRegistro()">➕ Adicionar</button>
</section>
